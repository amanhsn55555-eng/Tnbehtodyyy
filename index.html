<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🔔 الإشعارات • منصتي</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Tajawal', sans-serif;
    }

    body {
      background: linear-gradient(145deg, #f5f7fa 0%, #e8eef5 100%);
      min-height: 100vh;
      padding: 20px 12px 90px;
      color: #01172a;
    }

    .notification-card {
      background: linear-gradient(145deg, #f8fafc, #e2e8f0) !important;
      border: none !important;
      box-shadow: inset 2px 2px 5px #ffffff, inset -2px -2px 5px #94a3b8, 3px 3px 8px rgba(0,0,0,0.1), -1px -1px 4px rgba(255,255,255,0.6) !important;
      border-radius: 20px !important;
      padding: 16px 14px !important;
      margin-bottom: 16px !important;
      color: #1e293b !important;
    }

    .filter-section {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      flex-wrap: nowrap;
      overflow-x: auto;
      gap: 8px;
      margin: 0 -12px 20px -12px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      border-bottom: 1px solid rgba(251, 191, 36, 0.25);
      white-space: nowrap;
    }

    .filter-section::-webkit-scrollbar {
      height: 4px;
      background: transparent;
    }
    .filter-section::-webkit-scrollbar-thumb {
      background: #fbbf24;
      border-radius: 20px;
    }

    .filter-btn {
      flex-shrink: 0;
      background: linear-gradient(145deg, #f8fafc, #e2e8f0) !important;
      border: none !important;
      box-shadow: inset 2px 2px 5px #ffffff, inset -2px -2px 5px #94a3b8, 3px 3px 8px rgba(0,0,0,0.1), -1px -1px 4px rgba(255,255,255,0.6) !important;
      border-radius: 30px !important;
      padding: 10px 18px !important;
      font-size: 14px !important;
      font-weight: 700 !important;
      color: #1e293b !important;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      white-space: nowrap;
    }

    .filter-btn i {
      font-size: 14px !important;
      color: #64748b !important;
    }

    .filter-btn.active, .filter-btn.all-active {
      background: #1e293b !important;
      color: white !important;
      box-shadow: 0 6px 14px rgba(251, 191, 36, 0.2) !important;
    }

    .filter-btn.active i, .filter-btn.all-active i {
      color: #fbbf24 !important;
    }

    .notify-header {
      display: none !important;
    }

    .notif-avatar {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      border: 3px solid;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 6px 12px -4px rgba(0,0,0,0.1);
    }

    .notif-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .notif-content {
      flex: 1;
    }

    .notif-header {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px 8px;
      margin-bottom: 6px;
    }

    .actor-name {
      font-weight: 800;
      font-size: 16px;
      color: #0f172a;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .verified-icon {
      color: #3b82f6;
      font-size: 14px;
    }

    .user-badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 30px;
      font-weight: 700;
      background: #fbbf24;
      color: #0f172a;
    }

    .notif-action {
      font-size: 13px;
      color: #475569;
      display: flex;
      align-items: center;
      gap: 5px;
      background: #f8fafc;
      padding: 2px 10px;
      border-radius: 20px;
    }

    .notif-time {
      font-size: 11px;
      color: #94a3b8;
      margin-right: auto;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .notif-preview {
      background: #f8fafc;
      padding: 12px 14px;
      border-radius: 18px;
      margin: 10px 0 4px;
      font-size: 13px;
      color: #1e293b;
      border: 1px solid #eef2f6;
      cursor: pointer;
      transition: 0.15s;
    }

    /* أزرار دعوة الارتباط */
    .connection-request-actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .accept-btn, .reject-btn {
      flex: 1;
      padding: 12px 16px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .accept-btn {
      background: linear-gradient(145deg, #10b981, #059669);
      color: white;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    .reject-btn {
      background: linear-gradient(145deg, #ef4444, #dc2626);
      color: white;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }

    .viewer-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(145deg, #e0e7ff, #c7d2fe);
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 700;
      color: #3730a3;
      margin-top: 8px;
      cursor: pointer;
      border: 1px solid #a5b4fc;
    }

    .share-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(145deg, #fef3c7, #fde68a);
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 700;
      color: #92400e;
      margin-top: 8px;
      cursor: pointer;
      border: 1px solid #fcd34d;
    }

    .unfollow-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(145deg, #fee2e2, #fecaca);
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 700;
      color: #991b1b;
      margin-top: 8px;
      cursor: pointer;
      border: 1px solid #f87171;
    }

    .back-btn-filter {
      flex-shrink: 0;
      background: white;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
      color: #fbbf24;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      cursor: pointer;
      border: 1px solid rgba(251,191,36,0.2);
      margin-left: 8px;
    }

    .empty-state {
      text-align: center;
      padding: 50px 20px;
      background: rgba(255,255,255,0.5);
      border-radius: 40px;
      backdrop-filter: blur(5px);
      color: #64748b;
    }

    .empty-state i {
      font-size: 55px;
      color: #cbd5e1;
      margin-bottom: 15px;
    }

    #toastMsg {
      position: fixed;
      bottom: 30px;
      left: 20px;
      right: 20px;
      background: #1e293b;
      color: white;
      padding: 14px 20px;
      border-radius: 50px;
      text-align: center;
      z-index: 5000;
      opacity: 0;
      transition: 0.2s;
      pointer-events: none;
      max-width: 400px;
      margin: 0 auto;
      font-weight: 600;
      font-size: 14px;
    }

    #toastMsg.show {
      opacity: 1;
      bottom: 40px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div id="toastMsg"></div>

<!-- شريط التصفية -->
<div class="filter-section">
  <div class="back-btn-filter" onclick="window.location.href='index.html'">
    <i class="fas fa-arrow-right"></i>
  </div>
  <button class="filter-btn all-active" data-filter="all"><i class="fas fa-list"></i> الكل</button>
  <button class="filter-btn" data-filter="like"><i class="fas fa-heart"></i> إعجاب</button>
  <button class="filter-btn" data-filter="comment"><i class="fas fa-comment"></i> تعليق</button>
  <button class="filter-btn" data-filter="follow"><i class="fas fa-user-plus"></i> متابعة</button>
  <button class="filter-btn" data-filter="unfollow"><i class="fas fa-user-minus"></i> إلغاء</button>
  <button class="filter-btn" data-filter="story"><i class="fas fa-clock"></i> ستوري</button>
  <button class="filter-btn" data-filter="share"><i class="fas fa-share"></i> مشاركة</button>
  <button class="filter-btn" data-filter="post"><i class="fas fa-feather"></i> منشور</button>
  <button class="filter-btn" data-filter="connection"><i class="fas fa-link"></i> ارتباط</button>
  <button class="filter-btn" data-filter="view"><i class="fas fa-eye"></i> مشاهدات</button>
</div>

<div id="notificationsContainer">
  <div style="text-align:center; padding: 40px; color: #64748b;">
    <i class="fas fa-spinner fa-pulse" style="font-size: 30px; margin-bottom: 15px;"></i>
    <p>جاري تحميل الإشعارات...</p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-auth.js";
  import { getFirestore, collection, query, where, onSnapshot, doc, getDoc, getDocs, updateDoc, arrayUnion, arrayRemove, deleteField, setDoc } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDYKCCTcurNcJslrNKqdiJCoIIK-YZArB4",
    authDomain: "sbaq-fc46f.firebaseapp.com",
    projectId: "sbaq-fc46f",
    storageBucket: "sbaq-fc46f.firebasestorage.app",
    appId: "1:1026865750415:web:0ee39a717bcafaa0d06bfa"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let currentUserData = null;
  let followersMap = {};
  let followingList = [];
  let allNotifications = [];
  let activeFilter = 'all';
  let usersMap = new Map();

  const container = document.getElementById('notificationsContainer');
  const filterBtns = document.querySelectorAll('.filter-btn');

  function showToast(msg, isGood = true) {
    const t = document.getElementById('toastMsg');
    t.textContent = msg;
    t.style.background = isGood ? '#10b981' : '#ef4444';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  async function loadCurrentUserData(uid) {
    const userDoc = await getDoc(doc(db, "users", uid));
    if (userDoc.exists()) {
      currentUserData = userDoc.data();
      currentUserData.uid = uid;
    } else {
      currentUserData = { userId: uid.slice(0,6), username: 'مستخدم', emoji: '😎', colors: {frame:'#fbbf24'} };
    }
  }

  async function loadFollowersData() {
    const followersDoc = await getDoc(doc(db, "social", "followers"));
    if (followersDoc.exists()) {
      followersMap = followersDoc.data();
    }
    if (currentUser) {
      followingList = followersMap[currentUser.uid] || [];
    }
  }

  async function fetchAllUsers() {
    const usersSnap = await getDocs(collection(db, "users"));
    usersSnap.forEach(doc => {
      const data = doc.data();
      data.uid = doc.id;
      usersMap.set(data.userId || doc.id.slice(0,6), data);
    });
    return usersMap;
  }

  // ========== قبول طلب الارتباط (نسخة محسنة) ==========
  async function acceptConnectionRequest(requesterId, requesterUid) {
    if (!currentUser || !currentUserData) return;
    
    try {
      console.log('🔄 جاري قبول طلب الارتباط من:', requesterId);
      
      const myUid = currentUser.uid;
      const myUserId = currentUserData.userId || myUid.slice(0,6);
      
      // جلب بياناتي
      const myUserRef = doc(db, "users", myUid);
      const myUserDoc = await getDoc(myUserRef);
      const myData = myUserDoc.data() || {};
      
      // جلب بيانات مقدم الطلب
      const requesterRef = doc(db, "users", requesterUid);
      const requesterDoc = await getDoc(requesterRef);
      const requesterData = requesterDoc.data() || {};
      
      if (!requesterData.userId) {
        showToast('❌ المستخدم غير موجود', false);
        return;
      }
      
      // ========== تحديث بياناتي ==========
      await updateDoc(myUserRef, {
        relationship: 'مرتبط',
        partnerId: requesterData.userId || requesterId,
        partnerName: requesterData.username || 'مستخدم',
        partnerEmoji: requesterData.emoji || '👤',
        partnerAvatarType: requesterData.avatarType || 'emoji',
        partnerAvatarUrl: requesterData.avatarUrl || '',
        partnerUid: requesterUid,
        partnerRequest: deleteField()
      });
      
      console.log('✅ تم تحديث بياناتي - أصبحت مرتبطاً مع:', requesterData.username);
      
      // ========== تحديث بيانات الطرف الآخر ==========
      await updateDoc(requesterRef, {
        relationship: 'مرتبط',
        partnerId: myUserId,
        partnerName: myData.username || 'مستخدم',
        partnerEmoji: myData.emoji || '😎',
        partnerAvatarType: myData.avatarType || 'emoji',
        partnerAvatarUrl: myData.avatarUrl || '',
        partnerUid: myUid
      });
      
      console.log('✅ تم تحديث بيانات الطرف الآخر - أصبح مرتبطاً معي');
      
      // ========== إضافة إشعار قبول للطرف الآخر ==========
      const otherNotifRef = doc(db, "notifications", requesterUid);
      const otherNotifDoc = await getDoc(otherNotifRef);
      
      const acceptanceNotif = {
        type: 'connection_accepted',
        acceptorId: myUserId,
        acceptorName: myData.username || 'مستخدم',
        acceptorEmoji: myData.emoji || '😎',
        acceptorAvatarType: myData.avatarType,
        acceptorAvatarUrl: myData.avatarUrl,
        acceptorColors: myData.colors,
        timestamp: Date.now(),
        message: `${myData.username || 'مستخدم'} قبل طلب الارتباط`
      };
      
      let connectionAccepted = [];
      if (otherNotifDoc.exists()) {
        connectionAccepted = otherNotifDoc.data().connectionAccepted || [];
      }
      connectionAccepted.push(acceptanceNotif);
      
      await setDoc(otherNotifRef, { connectionAccepted: connectionAccepted }, { merge: true });
      
      // ========== حذف طلب الارتباط من إشعاراتي ==========
      const myNotifRef = doc(db, "notifications", myUid);
      const myNotifDoc = await getDoc(myNotifRef);
      
      if (myNotifDoc.exists()) {
        const requests = myNotifDoc.data().connectionRequests || [];
        const updated = requests.filter(r => r.requesterId !== requesterId);
        await updateDoc(myNotifRef, { connectionRequests: updated });
      }
      
      showToast('💑 تم قبول طلب الارتباط! أنت الآن مرتبط', true);
      
      // تحديث البيانات المحلية
      currentUserData.relationship = 'مرتبط';
      currentUserData.partnerId = requesterData.userId;
      currentUserData.partnerName = requesterData.username;
      currentUserData.partnerEmoji = requesterData.emoji;
      
      // إعادة تحميل الإشعارات
      await buildNotificationsFromSnapshot();
      
      // فتح الملف الشخصي لإظهار التغيير
      setTimeout(() => {
        if (confirm('🎉 تم الارتباط بنجاح! هل تريد فتح ملفك الشخصي؟')) {
          window.openProfile(myUserId);
        }
      }, 500);
      
    } catch (error) {
      console.error('❌ خطأ في قبول الارتباط:', error);
      showToast('❌ حدث خطأ: ' + error.message, false);
    }
  }

  // ========== رفض طلب الارتباط ==========
  async function rejectConnectionRequest(requesterId) {
    if (!currentUser) return;
    
    try {
      const notifRef = doc(db, "notifications", currentUser.uid);
      const notifDoc = await getDoc(notifRef);
      
      if (notifDoc.exists()) {
        const requests = notifDoc.data().connectionRequests || [];
        const updated = requests.filter(r => r.requesterId !== requesterId);
        await updateDoc(notifRef, { connectionRequests: updated });
      }
      
      showToast('تم رفض طلب الارتباط', true);
      await buildNotificationsFromSnapshot();
      
    } catch (error) {
      console.error('Error:', error);
      showToast('❌ حدث خطأ', false);
    }
  }

  // ========== بناء الإشعارات ==========
  async function buildNotificationsFromSnapshot() {
    if (!currentUser || !currentUserData) return;
    
    const myUserId = currentUserData.userId || currentUser.uid.slice(0,6);
    const myUid = currentUser.uid;
    
    const postsSnap = await getDocs(collection(db, "posts"));
    const storiesSnap = await getDocs(collection(db, "stories"));
    const notifSnap = await getDoc(doc(db, "notifications", myUid));
    
    const posts = [];
    postsSnap.forEach(d => { posts.push({id: d.id, ...d.data()}); });
    const stories = [];
    storiesSnap.forEach(d => { stories.push({id: d.id, ...d.data()}); });
    
    await fetchAllUsers();
    
    const notifications = [];
    const now = Date.now();
    
    // 1. إشعارات التعليقات
    posts.filter(p => p.userId === myUserId).forEach(post => {
      (post.comments || []).forEach(c => {
        if (c.userId === myUserId) return;
        notifications.push({
          id: `comment_${post.id}_${c.timestamp || now}`,
          type: 'comment',
          actorId: c.userId,
          actorUsername: c.username,
          actorEmoji: c.emoji,
          actorAvatarType: c.avatarType,
          actorAvatarUrl: c.avatarUrl,
          actorColors: c.colors,
          actorVerified: c.verified,
          targetPostId: post.id,
          targetPostContent: post.content,
          timestamp: c.timestamp || now,
          text: c.text
        });
      });
    });
    
    // 2. إعجابات
    posts.filter(p => p.userId === myUserId).forEach(post => {
      (post.likedBy || []).forEach(uid => {
        const actor = usersMap.get(uid.slice(0,6)) || { username: 'مستخدم', emoji: '👤' };
        if (uid === myUid) return;
        notifications.push({
          id: `like_${post.id}_${uid}`,
          type: 'like',
          actorId: actor.userId || uid.slice(0,6),
          actorUsername: actor.username,
          actorEmoji: actor.emoji,
          actorAvatarType: actor.avatarType,
          actorAvatarUrl: actor.avatarUrl,
          actorColors: actor.colors,
          actorVerified: actor.verified,
          targetPostId: post.id,
          targetPostContent: post.content,
          timestamp: post.likesTimestamp?.[uid] || post.timestamp || now,
        });
      });
    });
    
    // 3. مشاركات
    posts.filter(p => p.userId === myUserId).forEach(post => {
      (post.sharedBy || []).forEach(share => {
        notifications.push({
          id: `share_${post.id}_${share.userId}_${share.timestamp}`,
          type: 'share',
          actorId: share.userId,
          actorUsername: share.username,
          actorEmoji: share.emoji,
          actorAvatarType: share.avatarType,
          actorAvatarUrl: share.avatarUrl,
          actorColors: share.colors,
          targetPostId: post.id,
          targetPostContent: post.content,
          timestamp: share.timestamp || now,
          shareComment: share.comment
        });
      });
    });
    
    // 4. متابعة جديدة
    const myFollowers = Object.entries(followersMap).filter(([uid, list]) => list.includes(myUserId)).map(([uid]) => uid);
    for (const followerUid of myFollowers) {
      const actor = usersMap.get(followerUid.slice(0,6)) || { username: 'مستخدم', emoji: '👤' };
      notifications.push({
        id: `follow_${followerUid}`,
        type: 'follow',
        actorId: actor.userId || followerUid.slice(0,6),
        actorUsername: actor.username,
        actorEmoji: actor.emoji,
        actorAvatarType: actor.avatarType,
        actorAvatarUrl: actor.avatarUrl,
        actorColors: actor.colors,
        actorVerified: actor.verified,
        timestamp: now
      });
    }
    
    // 5. إلغاء المتابعة
    const unfollowNotifications = JSON.parse(localStorage.getItem('unfollow_notifications') || '[]');
    unfollowNotifications.forEach(unfollow => {
      notifications.push({
        id: `unfollow_${unfollow.userId}_${unfollow.timestamp}`,
        type: 'unfollow',
        actorId: unfollow.userId,
        actorUsername: unfollow.username,
        actorEmoji: unfollow.emoji,
        timestamp: unfollow.timestamp
      });
    });
    
    // 6. ستوريات جديدة
    const followingIds = followingList;
    const recentStories = stories.filter(s => followingIds.includes(s.userId) && s.timestamp > now - 86400000);
    recentStories.forEach(story => {
      notifications.push({
        id: `story_${story.id}`,
        type: 'story',
        actorId: story.userId,
        actorUsername: story.username,
        actorEmoji: story.emoji,
        actorAvatarType: story.avatarType,
        actorAvatarUrl: story.avatarUrl,
        actorColors: story.colors,
        storyId: story.id,
        timestamp: story.timestamp,
      });
    });
    
    // 7. منشورات جديدة
    const recentPosts = posts.filter(p => followingIds.includes(p.userId) && p.timestamp > now - 86400000*2);
    recentPosts.forEach(post => {
      notifications.push({
        id: `newpost_${post.id}`,
        type: 'post',
        actorId: post.userId,
        actorUsername: post.username,
        actorEmoji: post.emoji,
        actorAvatarType: post.avatarType,
        actorAvatarUrl: post.avatarUrl,
        actorColors: post.colors,
        targetPostId: post.id,
        targetPostContent: post.content,
        timestamp: post.timestamp,
      });
    });
    
    // 8. دعوات الارتباط
    if (notifSnap.exists()) {
      const connectionRequests = notifSnap.data().connectionRequests || [];
      connectionRequests.forEach(req => {
        notifications.push({
          id: `connection_${req.requesterId}_${req.timestamp}`,
          type: 'connection',
          actorId: req.requesterId,
          actorUsername: req.requesterName,
          actorEmoji: req.requesterEmoji,
          actorAvatarType: req.avatarType,
          actorAvatarUrl: req.avatarUrl,
          actorColors: req.colors,
          timestamp: req.timestamp,
          requesterUid: req.requesterUid
        });
      });
    }
    
    // 9. مشاهدات الملف الشخصي
    if (notifSnap.exists()) {
      const profileViews = notifSnap.data().profileViews || [];
      profileViews.forEach(view => {
        notifications.push({
          id: `view_${view.viewerId}_${view.timestamp}`,
          type: 'view',
          actorId: view.viewerId,
          actorUsername: view.viewerName,
          actorEmoji: view.viewerEmoji,
          actorAvatarType: view.avatarType,
          actorAvatarUrl: view.avatarUrl,
          actorColors: view.colors,
          timestamp: view.timestamp
        });
      });
    }
    
    // ترتيب وإزالة التكرار
    const uniqueMap = new Map();
    notifications.sort((a,b) => (b.timestamp||0) - (a.timestamp||0)).forEach(n => {
      if (!uniqueMap.has(n.id)) uniqueMap.set(n.id, n);
    });
    
    allNotifications = Array.from(uniqueMap.values());
    renderFilteredNotifications();
  }

  function renderFilteredNotifications() {
    let filtered = [...allNotifications];
    
    if (activeFilter !== 'all') {
      filtered = filtered.filter(n => n.type === activeFilter || n.subType === activeFilter);
    }
    
    if (filtered.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-bell-slash"></i>
          <h3>لا توجد إشعارات</h3>
          <p>لم يصلك أي إشعار حتى الآن</p>
        </div>
      `;
      return;
    }
    
    let html = '';
    filtered.forEach(notif => {
      const actor = {
        username: notif.actorUsername || 'مستخدم',
        emoji: notif.actorEmoji || '👤',
        avatarType: notif.actorAvatarType,
        avatarUrl: notif.actorAvatarUrl,
        colors: notif.actorColors || {frame:'#fbbf24'},
        verified: notif.actorVerified || false,
        userId: notif.actorId
      };
      
      const timeStr = notif.timestamp ? new Date(notif.timestamp).toLocaleString('ar-SA', {hour:'2-digit', minute:'2-digit', day:'numeric', month:'numeric'}) : '';
      
      let actionText = '';
      let previewHtml = '';
      let extraActions = '';
      
      if (notif.type === 'like') {
        actionText = 'أعجب بمنشورك';
        previewHtml = `<div class="notif-preview" onclick="window.openPost('${notif.targetPostId}')"><i class="fas fa-file-alt"></i> ${notif.targetPostContent?.substring(0,80) || 'منشور'} ...</div>`;
      } else if (notif.type === 'comment') {
        actionText = 'علّق على منشورك';
        previewHtml = `<div class="notif-preview" onclick="window.openComments('${notif.targetPostId}')"><i class="fas fa-comment-dots"></i> "${notif.text?.substring(0,60)}"</div>`;
      } else if (notif.type === 'follow') {
        actionText = 'تابعك';
      } else if (notif.type === 'unfollow') {
        actionText = 'ألغى متابعتك';
        previewHtml = `<div class="unfollow-badge" onclick="window.openProfile('${actor.userId}')"><i class="fas fa-user-slash"></i> ${actor.username} ألغى متابعتك</div>`;
      } else if (notif.type === 'story') {
        actionText = 'نشر ستوري جديد';
        previewHtml = `<div class="notif-preview" onclick="window.viewStory('${notif.storyId}')"><i class="fas fa-play"></i> اضغط لمشاهدة الستوري</div>`;
      } else if (notif.type === 'post') {
        actionText = 'نشر منشوراً جديداً';
        previewHtml = `<div class="notif-preview" onclick="window.openPost('${notif.targetPostId}')"><i class="fas fa-newspaper"></i> ${notif.targetPostContent?.substring(0,80) || 'منشور'} ...</div>`;
      } else if (notif.type === 'share') {
        actionText = 'شارك منشورك';
        previewHtml = `
          <div class="share-badge" onclick="window.openPost('${notif.targetPostId}')">
            <i class="fas fa-retweet"></i> 
            ${actor.username} شارك منشورك
            ${notif.shareComment ? `<br><small>"${notif.shareComment}"</small>` : ''}
          </div>
        `;
      } else if (notif.type === 'connection') {
        actionText = 'يرغب في الارتباط بك';
        extraActions = `
          <div class="connection-request-actions">
            <button class="accept-btn" onclick="window.acceptConnection('${notif.actorId}', '${notif.requesterUid}')">
              <i class="fas fa-check-circle"></i> قبول
            </button>
            <button class="reject-btn" onclick="window.rejectConnection('${notif.actorId}')">
              <i class="fas fa-times-circle"></i> رفض
            </button>
          </div>
        `;
        previewHtml = `
          <div class="notif-preview" style="background: linear-gradient(145deg, #fef3c7, #fde68a);">
            <i class="fas fa-heart" style="color: #ec4899;"></i> ${actor.username} يريد الارتباط بك 💍
          </div>
        `;
      } else if (notif.type === 'view') {
        actionText = 'شاهد ملفك الشخصي';
        previewHtml = `
          <div class="viewer-badge" onclick="window.openProfile('${actor.userId}')">
            <i class="fas fa-eye"></i> ${actor.username} شاهد ملفك الشخصي
          </div>
        `;
      }
      
      html += `
        <div class="notification-card">
          <div class="notif-avatar" style="border-color: ${actor.colors?.frame || '#fbbf24'};" onclick="window.openProfile('${actor.userId}')">
            ${actor.avatarType === 'image' && actor.avatarUrl ? `<img src="${actor.avatarUrl}">` : actor.emoji}
          </div>
          <div class="notif-content">
            <div class="notif-header">
              <span class="actor-name" onclick="window.openProfile('${actor.userId}')">
                ${actor.username} ${actor.verified ? '<i class="fas fa-check-circle verified-icon"></i>' : ''}
              </span>
              <span class="user-badge" style="background:${actor.colors?.frame || '#fbbf24'};">#${actor.userId}</span>
              <span class="notif-action">
                <i class="fas ${getActionIconClass(notif.type)}"></i> ${actionText}
              </span>
              <span class="notif-time"><i class="far fa-clock"></i> ${timeStr}</span>
            </div>
            ${previewHtml}
            ${extraActions}
          </div>
        </div>
      `;
    });
    
    container.innerHTML = html;
  }
  
  function getActionIconClass(type) {
    const map = { 
      like: 'fa-heart', 
      comment: 'fa-comment', 
      follow: 'fa-user-plus', 
      unfollow: 'fa-user-minus',
      story: 'fa-clock', 
      post: 'fa-feather', 
      share: 'fa-share',
      connection: 'fa-heart',
      view: 'fa-eye'
    };
    return map[type] || 'fa-bell';
  }

  function initFilters() {
    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => { b.classList.remove('active', 'all-active'); });
        btn.classList.add('active');
        if (btn.dataset.filter === 'all') btn.classList.add('all-active');
        activeFilter = btn.dataset.filter;
        renderFilteredNotifications();
      });
    });
  }

  window.openProfile = (userId) => {
    localStorage.setItem('openProfileId', userId);
    window.location.href = 'index.html';
  };
  
  window.openPost = (postId) => {
    localStorage.setItem('openPostId', postId);
    window.location.href = 'index.html';
  };
  
  window.openComments = (postId) => {
    localStorage.setItem('openCommentsId', postId);
    window.location.href = 'index.html';
  };
  
  window.viewStory = (storyId) => {
    localStorage.setItem('openStoryId', storyId);
    window.location.href = 'index.html';
  };
  
  window.acceptConnection = async (requesterId, requesterUid) => {
    await acceptConnectionRequest(requesterId, requesterUid);
  };
  
  window.rejectConnection = async (requesterId) => {
    await rejectConnectionRequest(requesterId);
  };

  function subscribeToNotifications() {
    if (!currentUser) return;
    
    const myUid = currentUser.uid;
    
    onSnapshot(collection(db, "posts"), async () => {
      await buildNotificationsFromSnapshot();
    });
    
    onSnapshot(collection(db, "stories"), async () => {
      await buildNotificationsFromSnapshot();
    });
    
    onSnapshot(doc(db, "social", "followers"), async (docSnap) => {
      if (docSnap.exists()) {
        const newFollowers = docSnap.data();
        
        if (followersMap[currentUser.uid]) {
          const oldFollowing = followersMap[currentUser.uid] || [];
          const newFollowing = newFollowers[currentUser.uid] || [];
          const removed = oldFollowing.filter(id => !newFollowing.includes(id));
          
          if (removed.length > 0) {
            const unfollowNotifications = JSON.parse(localStorage.getItem('unfollow_notifications') || '[]');
            removed.forEach(userId => {
              unfollowNotifications.push({
                userId: userId,
                username: usersMap.get(userId)?.username || 'مستخدم',
                emoji: usersMap.get(userId)?.emoji || '👤',
                timestamp: Date.now()
              });
            });
            localStorage.setItem('unfollow_notifications', JSON.stringify(unfollowNotifications.slice(-50)));
          }
        }
        
        followersMap = newFollowers;
        followingList = newFollowers[currentUser.uid] || [];
        await buildNotificationsFromSnapshot();
      }
    });
    
    onSnapshot(doc(db, "notifications", myUid), async () => {
      await buildNotificationsFromSnapshot();
    });
  }

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      await loadCurrentUserData(user.uid);
      await loadFollowersData();
      subscribeToNotifications();
      initFilters();
      setTimeout(() => buildNotificationsFromSnapshot(), 300);
    } else {
      container.innerHTML = `<div class="empty-state"><i class="fas fa-sign-in-alt"></i><h3>يرجى تسجيل الدخول</h3></div>`;
    }
  });
</script>
</body>
</html>
